<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图标生成器</title>
</head>
<body>
    <h1>金十AI解读 - 图标生成器</h1>
    <p>点击下方按钮生成并下载图标：</p>
    <button onclick="generateIcon(16)">生成 16x16</button>
    <button onclick="generateIcon(48)">生成 48x48</button>
    <button onclick="generateIcon(128)">生成 128x128</button>
    <div id="output"></div>

    <script>
        function generateIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            // 背景渐变
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');

            // 圆角矩形背景
            const radius = size * 0.2;
            ctx.beginPath();
            ctx.moveTo(radius, 0);
            ctx.lineTo(size - radius, 0);
            ctx.quadraticCurveTo(size, 0, size, radius);
            ctx.lineTo(size, size - radius);
            ctx.quadraticCurveTo(size, size, size - radius, size);
            ctx.lineTo(radius, size);
            ctx.quadraticCurveTo(0, size, 0, size - radius);
            ctx.lineTo(0, radius);
            ctx.quadraticCurveTo(0, 0, radius, 0);
            ctx.closePath();
            ctx.fillStyle = gradient;
            ctx.fill();

            // 机器人脸
            const centerX = size / 2;
            const centerY = size / 2;
            const faceRadius = size * 0.2;

            // 头部
            ctx.beginPath();
            ctx.arc(centerX, centerY - faceRadius * 0.3, faceRadius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.fill();

            // 眼睛
            const eyeRadius = faceRadius * 0.25;
            const eyeOffset = faceRadius * 0.4;
            ctx.beginPath();
            ctx.arc(centerX - eyeOffset, centerY - faceRadius * 0.5, eyeRadius, 0, Math.PI * 2);
            ctx.arc(centerX + eyeOffset, centerY - faceRadius * 0.5, eyeRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#667eea';
            ctx.fill();

            // 嘴巴
            ctx.beginPath();
            ctx.arc(centerX, centerY + faceRadius * 0.2, faceRadius * 0.5, 0, Math.PI);
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = size * 0.02;
            ctx.lineCap = 'round';
            ctx.stroke();

            // 天线
            ctx.beginPath();
            ctx.moveTo(centerX, centerY - faceRadius * 1.3);
            ctx.lineTo(centerX, centerY - faceRadius * 1.6);
            ctx.strokeStyle = 'white';
            ctx.lineWidth = size * 0.03;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(centerX, centerY - faceRadius * 1.7, faceRadius * 0.15, 0, Math.PI * 2);
            ctx.fillStyle = '#764ba2';
            ctx.fill();

            // 下载图标
            const link = document.createElement('a');
            link.download = `icon${size}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();

            // 显示预览
            const img = document.createElement('img');
            img.src = canvas.toDataURL('image/png');
            img.style.width = size + 'px';
            img.style.height = size + 'px';
            img.style.border = '1px solid #ccc';
            img.style.margin = '10px';

            document.getElementById('output').appendChild(img);
        }
    </script>
</body>
</html>
